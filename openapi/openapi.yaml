components:
  securitySchemes:
    BearerJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Enter the JWT access token in the format `Bearer <token>`.
  schemas:
    User:
      type: object
      required:
        - id
        - name
        - username
        - email
        - role
        - trustScore
        - totalPoint
        - createdAt
      properties:
